<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Cafe</title>
    <link rel="stylesheet" href="blogcafe.css">
    <link rel="stylesheet" href="/Normalize.css">
</head>

<body>
    <header class="site-header">
        <div class="contenedor">
            <div class="barra">
                <a href="Index.html">
                    <h1 class="no-margin">Blog<span>Decafe</span></h1>
                </a>
                <nav class="navegacion">
                    <a href="nosotro.html">nosotros</a>
                    <a href="cursos.html">Cursos</a>
                    <a href="Contacto-Cafe.html">Contacto</a>
                </nav>
            </div><!--barra-->
            <div class="texto-header">
                <h2 class="no-margin">Blog de Café con consejos y Cursos </h2>
                <p class="no-margin">Aprende de los expertos con las mejores recetas y consejos</p>
            </div>
        </div> <!--contenedor-->
    </header>
    <main class="contenedor">
        <h2 class="centrar-texto">Contacto</h2>

        <div class="grid centrar-columnas">
            <div class="columnas-12">
                <img src="/img/contacto.jpg" alt="imagen Contacto">
            </div>

            <div class="columnas-10 formulario-contacto">
                <form action="#">

                    <div class="campo">
                        <label for="Nombre">Nombre</label>
                        <input type="text" id="Nombre" placeholder="Tu Nombre">
                    </div>

                    <div class="campo">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="Tu Nombre">
                    </div>
                    <div class="campo mensaje">
                        <label for="mensaje">Mensaje</label>
                        <textarea id="mensaje"> </textarea>

                    </div>

                    <div class="campo enviar">
                        <input type="submit" value="Enviar" class="btn btn-primario">
                    </div>
                </form>
            </div>
        </div>

    </main>

    <footer class="site-footer">
        <div class="contenedor">
            <div class="barra">
                <a href="Index.html">
                    <p class="no-margin">Blog <span>Decafe</span></p>
                </a>
                <nav class="navegacion">
                    <a href="nosotro.html">nosotros</a>
                    <a href="cursos.html">Cursos</a>
                    <a href="Contacto-Cafe.html">Contacto</a>
                </nav>
            </div>
        </div>
    </footer>
